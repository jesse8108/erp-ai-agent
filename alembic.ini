# alembic.ini - 数据库迁移配置
# 完整文档: https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file

[alembic]
# migration 脚本目录
script_location = alembic

# 版本文件命名格式 - 年月日-顺序-slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# 时区
timezone = Asia/Shanghai

# 截断 slug 的最大长度
truncate_slug_length = 40

# SQLAlchemy URL - 由 env.py 从 settings 读取，这里不填
# sqlalchemy.url = 

# 递归搜索版本文件
revision_environment = false

# ============ 日志配置 ============
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
